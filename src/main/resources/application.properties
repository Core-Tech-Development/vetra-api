# =============================================================================
# Vetra API — Application Configuration
# =============================================================================

quarkus.application.name=vetra-api

# -----------------------------------------------------------------------------
# HTTP
# -----------------------------------------------------------------------------
quarkus.http.port=8080

# -----------------------------------------------------------------------------
# OpenAPI / Swagger UI
# -----------------------------------------------------------------------------
quarkus.smallrye-openapi.info-title=Vetra API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Vetra - Veterinary Imaging Specialist Platform API
quarkus.swagger-ui.always-include=true

# -----------------------------------------------------------------------------
# Health & Metrics
# -----------------------------------------------------------------------------
quarkus.health.extensions.enabled=true
quarkus.micrometer.export.prometheus.enabled=true

# -----------------------------------------------------------------------------
# Jackson
# -----------------------------------------------------------------------------
quarkus.jackson.write-dates-as-timestamps=false

# -----------------------------------------------------------------------------
# OIDC / Keycloak (resource server — bearer token validation)
# -----------------------------------------------------------------------------
quarkus.oidc.auth-server-url=${OIDC_AUTH_SERVER_URL:http://localhost:8180/realms/vetra}
quarkus.oidc.client-id=${OIDC_CLIENT_ID:vetra-api}
quarkus.oidc.credentials.secret=${OIDC_CLIENT_SECRET:change-me}
quarkus.oidc.tls.verification=none
quarkus.oidc.token.principal-claim=sub
quarkus.oidc.roles.role-claim-path=realm_access/roles

# -----------------------------------------------------------------------------
# OpenTelemetry
# -----------------------------------------------------------------------------
quarkus.otel.enabled=true
quarkus.otel.traces.enabled=true
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
quarkus.otel.exporter.otlp.protocol=grpc
quarkus.otel.resource.attributes=service.name=vetra-api,service.namespace=vetra,deployment.environment=${APP_ENV:local}

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p traceId=%X{traceId} spanId=%X{spanId} [%c{3.}] (%t) %s%e%n
quarkus.log.console.json=false
quarkus.log.level=INFO

# =============================================================================
# %dev profile — local development
# =============================================================================

# Reactive PgPool (used by repositories)
%dev.quarkus.datasource.reactive.url=postgresql://localhost:5432/vetra
%dev.quarkus.datasource.reactive.max-size=20

# JDBC datasource (used by Flyway only)
%dev.quarkus.datasource.db-kind=postgresql
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/vetra
%dev.quarkus.datasource.username=vetra
%dev.quarkus.datasource.password=vetra

# Flyway
%dev.quarkus.flyway.migrate-at-start=true
%dev.quarkus.flyway.baseline-on-migrate=true
%dev.quarkus.flyway.locations=db/migration

# OIDC
%dev.quarkus.oidc.auth-server-url=http://localhost:8180/realms/vetra

# OTEL
%dev.quarkus.otel.exporter.otlp.endpoint=http://localhost:4317

# Logging
%dev.quarkus.log.level=INFO
%dev.quarkus.log.category."dev.vetra".level=INFO
%dev.quarkus.log.console.json=false

# Keycloak Admin (user provisioning)
%dev.vetra.keycloak.admin-url=http://localhost:8180
%dev.vetra.keycloak.realm=vetra
%dev.vetra.keycloak.admin-username=admin
%dev.vetra.keycloak.admin-password=admin

# Security — permit all in dev mode (no Keycloak required)
%dev.quarkus.oidc.enabled=false
%dev.quarkus.http.auth.permission.dev-permit.paths=/*
%dev.quarkus.http.auth.permission.dev-permit.policy=permit

# =============================================================================
# %test profile — automated tests
# =============================================================================

# Reactive PgPool (Testcontainers will override via DevServices or test config)
%test.quarkus.datasource.reactive.url=postgresql://localhost:5432/vetra_test
%test.quarkus.datasource.reactive.max-size=5

# JDBC datasource (Flyway for tests)
%test.quarkus.datasource.db-kind=postgresql
%test.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/vetra_test
%test.quarkus.datasource.username=vetra
%test.quarkus.datasource.password=vetra
%test.quarkus.datasource.devservices.enabled=false

# Flyway
%test.quarkus.flyway.migrate-at-start=true
%test.quarkus.flyway.clean-at-start=true
%test.quarkus.flyway.locations=db/migration

# OIDC — disable for tests (use mock/test security)
%test.quarkus.oidc.enabled=false
%test.quarkus.oidc.auth-server-url=http://localhost:8180/realms/vetra

# OTEL — disable for tests
%test.quarkus.otel.enabled=false

# Logging
%test.quarkus.log.level=INFO
%test.quarkus.log.console.json=false

# Security — permit all in test mode
%test.quarkus.http.auth.permission.test-permit.paths=/*
%test.quarkus.http.auth.permission.test-permit.policy=permit

# =============================================================================
# %prod profile — Docker / production
# =============================================================================

# Reactive PgPool
%prod.quarkus.datasource.reactive.url=${DB_REACTIVE_URL:postgresql://postgres:5432/vetra}
%prod.quarkus.datasource.reactive.max-size=20

# JDBC datasource (Flyway only)
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.jdbc.url=${DB_JDBC_URL:jdbc:postgresql://postgres:5432/vetra}
%prod.quarkus.datasource.username=${DB_USERNAME:vetra}
%prod.quarkus.datasource.password=${DB_PASSWORD:vetra}

# Flyway
%prod.quarkus.flyway.migrate-at-start=true
%prod.quarkus.flyway.baseline-on-migrate=true
%prod.quarkus.flyway.locations=db/migration

# OIDC
%prod.quarkus.oidc.enabled=true
%prod.quarkus.oidc.auth-server-url=${OIDC_AUTH_SERVER_URL:http://keycloak:8080/realms/vetra}
%prod.quarkus.oidc.token.issuer=${OIDC_TOKEN_ISSUER:http://localhost:8180/realms/vetra}
%prod.quarkus.oidc.connection-delay=30S

# Keycloak Admin (user provisioning)
%prod.vetra.keycloak.admin-url=${KEYCLOAK_ADMIN_URL:http://keycloak:8080}
%prod.vetra.keycloak.realm=vetra
%prod.vetra.keycloak.admin-username=${KEYCLOAK_ADMIN_USERNAME:admin}
%prod.vetra.keycloak.admin-password=${KEYCLOAK_ADMIN_PASSWORD:admin}

# Security — permit unauthenticated access to public endpoints
%prod.quarkus.http.auth.permission.public.paths=/*
%prod.quarkus.http.auth.permission.public.policy=permit

# OTEL
%prod.quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4317}

# Logging
%prod.quarkus.log.level=INFO
%prod.quarkus.log.category."dev.vetra".level=INFO
%prod.quarkus.log.console.json=false
